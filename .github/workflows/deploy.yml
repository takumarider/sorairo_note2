name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # CI チェック (テスト・ビルド・品質)
  # ──────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────
  # Render へデプロイ
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "🚀 Deploying to Render..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$response" -eq 200 ] || [ "$response" -eq 201 ]; then
            echo "✅ Deploy triggered successfully (HTTP $response)"
          elif [ "$response" -eq 409 ]; then
            echo "ℹ️ Deploy already in progress on Render (HTTP $response), continuing"
          else
            echo "::error::Deploy hook failed with HTTP $response"
            exit 1
          fi

      - name: Wait for deploy health check
        if: ${{ vars.RENDER_SERVICE_URL != '' }}
        run: |
          echo "⏳ Waiting for deployment to become healthy..."
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.RENDER_SERVICE_URL }}" || echo "000")
            if [ "$status" -eq 200 ]; then
              echo "✅ Service is healthy (attempt $attempt/$max_attempts)"
              exit 0
            fi
            echo "⏳ Attempt $attempt/$max_attempts — HTTP $status, retrying in 10s..."
            sleep 10
          done
          echo "::warning::Health check timed out after $max_attempts attempts"

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
